<div class="auth-shell">
  <div class="auth-card">
    <h1>Reset Password</h1>
    <p>Choose a new password for your account.</p>

    <div class="alert success" *ngIf="successMessage">{{ successMessage }}</div>
    <div class="alert error" *ngIf="errorMessage">{{ errorMessage }}</div>

    <label class="field">
      <span>New Password</span>
      <input type="password" [(ngModel)]="password" placeholder="Minimum 6 characters">
    </label>

    <label class="field">
      <span>Confirm Password</span>
      <input type="password" [(ngModel)]="confirmPassword" placeholder="Re-enter password">
    </label>

    <button class="primary-btn" (click)="submit()" [disabled]="isLoading">
      {{ isLoading ? 'Updating...' : 'Reset Password' }}
    </button>

    <a routerLink="/login" class="back-link">Back to login</a>
  </div>
</div>
