<div class="auth-shell">
  <div class="auth-card">
    <h1>Forgot Password</h1>
    <p>Enter your email address and we’ll send you password reset instructions.</p>

    <div class="alert success" *ngIf="successMessage">{{ successMessage }}</div>
    <div class="alert error" *ngIf="errorMessage">{{ errorMessage }}</div>

    <label class="field">
      <span>Email Address</span>
      <input type="email" [(ngModel)]="email" placeholder="you@company.com">
    </label>

    <button class="primary-btn" (click)="submit()" [disabled]="isLoading">
      {{ isLoading ? 'Sending...' : 'Send Reset Link' }}
    </button>

    <a routerLink="/login" class="back-link">Back to login</a>
  </div>
</div>
