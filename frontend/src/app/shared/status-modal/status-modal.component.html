<div class="status-modal-backdrop" *ngIf="open" (click)="close()">
  <div class="status-modal-card" (click)="$event.stopPropagation()">
    <div class="status-modal-hdr">
      <h3>{{ title }}</h3>
      <button type="button" class="close-btn" (click)="close()">×</button>
    </div>
    <div class="status-modal-body">
      <div class="loading-row" *ngIf="isLoading">Loading status…</div>
      <div class="status-grid" *ngIf="!isLoading">
        <div class="status-tile status-tile--approved">
          <span class="status-label">Approved</span>
          <strong class="status-value">{{ loadedSummary.approved }}</strong>
        </div>
        <div class="status-tile status-tile--pending">
          <span class="status-label">Pending</span>
          <strong class="status-value">{{ loadedSummary.pending }}</strong>
        </div>
        <div class="status-tile status-tile--rejected">
          <span class="status-label">Rejected</span>
          <strong class="status-value">{{ loadedSummary.rejected }}</strong>
        </div>
        <div class="status-tile status-tile--inprocess" *ngIf="loadedSummary.inProcess">
          <span class="status-label">In Process</span>
          <strong class="status-value">{{ loadedSummary.inProcess }}</strong>
        </div>
      </div>
    </div>
    <div class="status-modal-ftr">
      <button type="button" class="btn-close-modal" (click)="close()">Close</button>
    </div>
  </div>
</div>
